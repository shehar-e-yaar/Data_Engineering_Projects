version: 2

models:
  - name: dim_users
    columns:
      - name: user_key
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - unique
          - not_null

  - name: dim_products
    columns:
      - name: product_key
        tests:
          - unique
          - not_null
      - name: product_id
        tests:
          - unique
          - not_null

  - name: dim_date
    columns:
      - name: date_key
        tests:
          - unique
          - not_null

  - name: fact_sales
    columns:
      - name: sales_key
        tests:
          - unique
          - not_null
      - name: user_key
        tests:
          - not_null
      - name: product_key
        tests:
          - not_null
      - name: date_key
        tests:
          - not_null